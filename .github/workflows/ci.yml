name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bash-syntax:
    name: Bash syntax (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Parse Bash scripts
        run: |
          bash -n install.sh
          bash -n install-linux.sh
          bash -n install-macos.sh
          bash -n shell-tools.sh

  shellcheck:
    name: ShellCheck advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck -x install.sh install-linux.sh install-macos.sh shell-tools.sh || true

  powershell:
    name: PowerShell validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @("install.ps1", "alias-tools.ps1")) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors) {
              $errors | Format-List | Out-String | Write-Error
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
      - name: PSScriptAnalyzer errors
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          $results = foreach ($file in @("install.ps1", "alias-tools.ps1")) {
            Invoke-ScriptAnalyzer -Path $file -Severity Error
          }
          $results | Format-Table -AutoSize
          if ($results) { exit 1 }

  secret-patterns:
    name: High-confidence secret patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for common leaked secrets
        run: |
          matches="$(git grep -n -E '(ghp_|github_pat_|sk-[A-Za-z0-9]|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|EC|DSA|PRIVATE)|Authorization:|Bearer [A-Za-z0-9]|password[[:space:]]*=|token[[:space:]]*=|secret[[:space:]]*=)' -- . ':!.github/workflows/ci.yml' || true)"
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            exit 1
          fi
